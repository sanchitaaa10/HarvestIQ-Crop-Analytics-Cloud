<!DOCTYPE html>
<html>
<head>
    <title>Edit Crop</title>
</head>
<body>

<h1>Edit Crop</h1>

<form method="POST">

    <input type="text"
           name="crop_name"
           value="{{ crop[1] }}"
           required>
    <br><br>

    <input type="text"
           name="location"
           value="{{ crop[2] }}"
           required>
    <br><br>

    <input type="number"
           name="yield_amount"
           value="{{ crop[3] }}"
           required>
    <br><br>

    <button type="submit">
        Update Crop
    </button>

</form>

</body>
</html>
