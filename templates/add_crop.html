<!DOCTYPE html>
<html>
<head>
    <title>Add Crop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="header">
    <h1>Add Crop Record</h1>
</div>

<div style="padding:30px;">

<form method="POST">

    <input
        type="text"
        name="crop_name"
        placeholder="Crop Name"
        required
    >
    <br><br>

    <input
        type="text"
        name="location"
        placeholder="Location"
        required
    >
    <br><br>

    <input
        type="number"
        name="yield_amount"
        placeholder="Yield Amount"
        required
    >
    <br><br>

    <button type="submit">
        Add Crop
    </button>

</form>

</div>

</body>
</html>
