<!DOCTYPE html>
<html>
<head>
    <title>Add Crop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="sidebar">
    <h2>HarvestIQ</h2>

    <a href="/dashboard">Dashboard</a>
    <a href="/add-crop">Add Crop</a>
    <a href="/crops">View Crops</a>
    <a href="/reports">Reports</a>
</div>

<div class="main-content">

    <div class="header">
        <h1>Add Crop Record</h1>
    </div>

    <div class="form-container">

        <form method="POST">

            <input type="text"
                   name="crop_name"
                   placeholder="Crop Name"
                   required>

            <input type="text"
                   name="location"
                   placeholder="Location"
                   required>

            <input type="number"
                   name="yield_amount"
                   placeholder="Yield Amount"
                   required>

            <button type="submit">
                Save Crop
            </button>

        </form>

    </div>

</div>

</body>
</html>
